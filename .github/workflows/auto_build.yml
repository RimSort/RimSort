# Auto build on push to main and PR.
# Not recommended to release these builds due to versioning.

name: Auto Build
on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "distribute.py"
      - "requirements*.txt"
  merge_group:

permissions: {}

jobs:
  pre-pyright:
    permissions:
      contents: read
    uses: ./.github/workflows/pyright.yml

  pre-test:
    permissions:
      contents: read
    uses: ./.github/workflows/pytest.yml

  pre-build:
    uses: ./.github/workflows/get_version_info.yml
    with:
      format_only: true

  attested-build:
    needs: pre-build
    if: github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      version_format: ${{ needs.pre-build.outputs.version_format }}
      attest: true

  non-attested-build:
    needs: pre-build
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      version_format: ${{ needs.pre-build.outputs.version_format }}
      attest: false

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs:
      - pre-pyright
      - pre-test
      - pre-build
      - attested-build
      - non-attested-build
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          results=(
            "${{ needs.pre-pyright.result }}"
            "${{ needs.pre-test.result }}"
            "${{ needs.pre-build.result }}"
            "${{ needs.attested-build.result }}"
            "${{ needs.non-attested-build.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::A required job finished with result: $r"
              exit 1
            fi
          done
          echo "All required jobs succeeded or were skipped."

# Auto build on push to main and PR.
# Not recommended to release these builds due to versioning.

name: Auto Build
on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "distribute.py"
      - "requirements*.txt"
  merge_group:

permissions: {}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_changed: ${{ steps.check.outputs.app_changed }}
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - name: Check for app-relevant changes
        id: check
        env:
          GH_EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          MG_BASE: ${{ github.event.merge_group.base_sha }}
          MG_HEAD: ${{ github.event.merge_group.head_sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [[ "$GH_EVENT" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "$PR_BASE"..."$PR_HEAD")
          elif [[ "$GH_EVENT" == "merge_group" ]]; then
            CHANGED=$(git diff --name-only "$MG_BASE"..."$MG_HEAD")
          else
            CHANGED=$(git diff --name-only "$PUSH_BEFORE" "$PUSH_SHA")
          fi

          APP_CHANGED=$(echo "$CHANGED" \
            | grep -v -E '^docs/' \
            | grep -v -E '\.md$' \
            | grep -v -E '^\.github/ISSUE_TEMPLATE/' \
            | grep -v -E '^\.github/(release|labeler)\.yml$' \
            | grep -v -E '^LICENSE' \
            || true)

          if [[ -n "$APP_CHANGED" ]]; then
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            echo "App-relevant files changed:"
            echo "$APP_CHANGED"
          else
            echo "app_changed=false" >> "$GITHUB_OUTPUT"
            echo "Only documentation files changed — builds will be skipped"
          fi

  pre-pyright:
    permissions:
      contents: read
    uses: ./.github/workflows/pyright.yml

  pre-test:
    permissions:
      contents: read
    uses: ./.github/workflows/pytest.yml

  pre-build:
    uses: ./.github/workflows/get_version_info.yml
    with:
      format_only: true

  attested-build:
    needs: [detect-changes, pre-build]
    if: >-
      needs.detect-changes.outputs.app_changed == 'true'
      && github.event_name != 'pull_request'
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      version_format: ${{ needs.pre-build.outputs.version_format }}
      attest: true

  non-attested-build:
    needs: [detect-changes, pre-build]
    if: >-
      needs.detect-changes.outputs.app_changed == 'true'
      && github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
      attestations: write
      packages: write
    uses: ./.github/workflows/build.yml
    with:
      version_format: ${{ needs.pre-build.outputs.version_format }}
      attest: false

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - pre-pyright
      - pre-test
      - pre-build
      - attested-build
      - non-attested-build
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [[ "${{ needs.detect-changes.outputs.app_changed }}" != "true" ]]; then
            echo "No app-relevant changes detected — builds were skipped."
          fi
          results=(
            "${{ needs.pre-pyright.result }}"
            "${{ needs.pre-test.result }}"
            "${{ needs.pre-build.result }}"
            "${{ needs.attested-build.result }}"
            "${{ needs.non-attested-build.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::A required job finished with result: $r"
              exit 1
            fi
          done
          echo "All required jobs succeeded or were skipped."
